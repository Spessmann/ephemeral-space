# ES START
    sprite: _ES/Objects/Tanks/plasma.rsi
# ES END
  - type: Item
# ES START
    sprite: _ES/Objects/Tanks/plasma.rsi
    shape:
    - 0,0,1,2
# ES END
  - type: GasTank
    outputPressure: 101.3
  - type: Clothing
# ES START
    sprite: _ES/Objects/Tanks/plasma.rsi
# ES END
    slots:
    - Belt
    - suitStorage
