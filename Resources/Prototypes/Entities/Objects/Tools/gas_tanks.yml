- type: entity
  abstract: true
  parent: BaseItem
  id: GasTankBase
  components:
  - type: Sprite
    sprite: Objects/Tanks/generic.rsi
    state: icon
  - type: Item
# ES START
    # Changes tanks to Large in order to reduce space efficiency of long-duration space gear.
    size: Large
    storedRotation: -90
# ES END
    sprite: Objects/Tanks/generic.rsi
  - type: Clothing
    quickEquip: false
    sprite: Objects/Tanks/generic.rsi
    slots:
    - Back
    - suitStorage
  - type: UseDelay
    delays:
      gasTank:
        length: 1.0
  - type: ActivatableUI
    key: enum.SharedGasTankUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SharedGasTankUiKey.Key:
        type: GasTankBoundUserInterface
  - type: GasTank
    outputPressure: 21.3
    air:
      # If gas tank volume is changed, adjust MinimumTritiumOxyburnEnergy in Atmospherics.cs by the same proportions
      volume: 5
      temperature: 293.15
    tankLowPressure: 30.0
  - type: Explosive
    explosionType: MicroBomb
    maxIntensity: 20
  - type: MeleeWeapon
    wideAnimationRotation: 45
    attackRate: 0.8
    damage:
      types:
        Blunt: 10
  - type: PhysicalComposition
    materialComposition:
      Steel: 185

- type: entity
  abstract: true
  parent: GasTankBase
  id: GasTankRoundBase
  components:
  - type: Tool
    qualities:
    - Rolling
    speedModifier: 0.6 # fairly unwieldly but nice round surface

- type: entity
  parent: GasTankRoundBase
  id: OxygenTank
  name: oxygen tank
  description: A standard cylindrical gas tank for oxygen. It can hold 5 L of gas.
  components:
  - type: Sprite
# ES START
    sprite: _ES/Objects/Tanks/oxygen.rsi
# ES END
  - type: Item
# ES START
    sprite: _ES/Objects/Tanks/oxygen.rsi
# ES END
  - type: Clothing
# ES START
    sprite: _ES/Objects/Tanks/oxygen.rsi
# ES END

- type: entity
  parent: GasTankRoundBase
  id: NitrogenTank
  name: nitrogen tank
  description: A standard cylindrical gas tank for nitrogen. It can hold 5 L of gas.
  components:
  - type: Sprite
# ES START
    sprite: _ES/Objects/Tanks/nitrogen.rsi
# ES END
  - type: Item
# ES START
    sprite: _ES/Objects/Tanks/nitrogen.rsi
# ES END
  - type: Clothing
# ES START
    sprite: _ES/Objects/Tanks/nitrogen.rsi
# ES END

- type: entity
  parent: GasTankRoundBase
  id: EmergencyOxygenTank
  name: emergency oxygen tank
  description: An easily portable tank for emergencies. Contains very little oxygen, rated for survival use only. It can hold 0.66 L of gas.
  components:
  - type: Sprite
# ES START
    sprite: _ES/Objects/Tanks/emergency_oxy.rsi
# ES END
  - type: Item
    size: Small
# ES START
    sprite: _ES/Objects/Tanks/emergency_oxy.rsi
    storedRotation: 0
# ES END
    storedSprite:
      state: storage
# ES START
      sprite: _ES/Objects/Tanks/emergency_oxy.rsi
# ES END
  - type: GasTank
    air:
      volume: 0.66
      temperature: 293.15
  - type: Clothing
# ES START
    sprite: _ES/Objects/Tanks/emergency_oxy.rsi
# ES END
    slots:
    - Pocket
    - Belt
    - suitStorage
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
  - type: PhysicalComposition
    materialComposition:
      Steel: 100

- type: entity
  parent: EmergencyOxygenTank
