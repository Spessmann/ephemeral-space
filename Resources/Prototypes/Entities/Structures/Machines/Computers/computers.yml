  components:
    - type: Sprite
      layers:
        - map: ["computerLayerBody"]
          state: computer
        - map: ["computerLayerKeyboard"]
          state: generic_keyboard
        - map: ["computerLayerScreen"]
          state: sensors
        - map: ["computerLayerKeys"]
          state: atmos_key
        - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
          state: generic_panel_open
    - type: PointLight
      radius: 1.5
      energy: 4.0
      color: "#43ccb5"
    - type: Computer
      board: SensorConsoleCircuitboard
    - type: SensorMonitoringConsole
    - type: ActivatableUI
      key: enum.SensorMonitoringConsoleUiKey.Key
    - type: UserInterface
      interfaces:
        enum.SensorMonitoringConsoleUiKey.Key:
          type: SensorMonitoringConsoleBoundUserInterface
        enum.WiresUiKey.Key:
          type: WiresBoundUserInterface
    - type: DeviceNetwork
      deviceNetId: AtmosDevices
      receiveFrequencyId: AtmosMonitor
      transmitFrequencyId: AtmosMonitor
      prefix: device-address-prefix-sensor-monitor
      sendBroadcastAttemptEvent: true
      examinableAddress: true
    - type: WiredNetworkConnection
    - type: DeviceList
    - type: AtmosDevice
