- type: entity
  parent: ESBaseVendingMachineDispenseOnHit
  id: ESVendingMachineGenderVendor
  name: GenderVendor
  description: A vendor containing various LGBTQ+ items. Provided by GayCorp LLC.
  components:
  - type: Sprite
    sprite: _ES/Structures/Vendors/gendervendor.rsi
  - type: VendingMachine
  - type: DatasetVocalizer
    dataset: GenderVendorAds
  - type: SpeakOnUIClosed
    pack: GenderVendorGoodbyes
  - type: PointLight
    color: "#fe0000"
  - type: ESEntityTableVendorFill
    inventory:
      all:
      - id: ClothingUniformColorRainbow # the description and sprite of this item should probably be updated later to be a little more fitting in this set. but still generic enough to not nessecarily be a pride item
        amount: 2
      - id: ClothingUniformJumpsuitAromantic
        amount: 2
      - id: ClothingUniformJumpsuitAsexual
        amount: 2
      - id: ClothingUniformJumpsuitGay
        amount: 2
      - id: ClothingUniformJumpsuitLesbian
        amount: 2
      - id: ClothingUniformJumpsuitBisexual
        amount: 2
      - id: ClothingUniformJumpsuitPansexual
        amount: 2
      - id: ClothingUniformJumpsuitTransgender
        amount: 2
      - id: ClothingUniformJumpsuitNonbinary
        amount: 2
      - id: ClothingUniformJumpsuitGenderfluid
        amount: 2
      - id: ClothingUniformJumpsuitIntersex
        amount: 2
      - id: ClothingUniformJumpsuitGenderqueer
        amount: 2

- type: entity
  parent: ESBaseVendingMachineDispenseOnHit
  id: ESVendingMachineSalvagedSams
  name: Salvaged Sam's Maintenance Surplus
  description: A vendor containing surplus maintenance supplies. Known to be involved in multiple controversies.
  components:
  - type: Sprite
    sprite: _ES/Structures/Vendors/salvagedsams.rsi
  - type: VendingMachine
  - type: DatasetVocalizer
    dataset: SalvagedAds
  - type: SpeakOnUIClosed
    pack: SalvagedGoodbyes
  - type: PointLight
    color: "#8f8200"
  - type: ESEntityTableVendorFill
    inventory:
      all:
      - tableId: ESMaintLootCommon # always garunteed a few basic items
      - tableId: ESMaintLootCommon # chance for more basic items, since there are a lot of useful ones. but we don't want them to be too common since it will clog up the vendor
        prob: 0.2
        rolls: 6
      - tableId: ESMaintLootUncommon # more interesting so you get these the most plentifully
        prob: 0.5
        rolls: 12
      - tableId: ESMaintLootRare # most interesting, so you're garunteed to get at least one
      - tableId: ESMaintLootRare # maybe you will get another rare
        prob: 0.2

